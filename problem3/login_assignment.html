<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>

<style> 
    body{
        margin: 0;
        padding: 0;
        height: 100vh;
        background: radial-gradient(#fbfff4,#cececd);
        display: flex;
        justify-content: center;
        align-items: center;
        font-size: larger;

    }
    .card{
        border-radius: 10px;
        background-color: rgb(255, 255, 255);
        width: 300px;
        height: 300px;
       padding: 5px;
       
    }
    form{
        display: flex;
        flex-direction: column;
        padding: 10px;
        
        
            }

    h2{
        text-align: center;
        margin-bottom: 20px;
    }
    input{
        margin: 5px;
        padding: 10px;
        border-radius: 10px;
        border: none;
        background-color: #e1e1de;
        border-bottom: #2d2d2a;
        
       
    }
    button{
        padding: 5px;
        border-radius: 10px;
        margin-top: 15px;
        cursor: pointer;
        font-weight: 600;
        font-size: larger;
        width: 100px;
        /* position: relative;
        left: 50px; */
        
        
    }
    .bnt{
        display: flex;
        justify-content: center;
    }
    button:hover{
        background-color: black;
        color: white;
    }

</style>

</head>  

<body>
    <div class="card">
        <h2>
            Login
        </h2>
        <form >
            <input type="email" placeholder="E-mail address" required>
            <input type="password" placeholder="Password" required >
            <button type="submit" class="bnt">Login</button>
        </form>
    </div>
</body>
</html>
