<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        *{
            padding: 0;
            margin: 0;
            box-sizing: border-box;
        }

        body{
            background-color: #a383b8;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: x-large;
            
        }
        .container
        {
            background-color: #f5f5f5;
            
            /* justify-content: center; */
            align-items: center;    
            /* height: 550px; */    
            width: 500px;
        }

        .header
        {
            padding: 25px;
            text-align: center;
            /* position: relative;
            bottom: 50px; */
            background-color: #d5a0ba;
        }
        div
        {
            padding: 5px;
            margin: 5px;
        }
        .btn
        {
            margin: 10px;
            padding: 5px;
            background-color: #dfdfe8fa;
            width: 90px;
            border-style: none;
            font-weight: bold;
        }
        .btn:hover
        {
            cursor: pointer;
            background-color: #ffffff;
        }

        input
        {
            padding: 5px;
            display: block;
            border-radius: 4px;
            border-color: #c44786;
            border-style: groove;
            
            /* border-style: none; */
        }
        span
        {
            color: #d82d2d;
        }
        
    </style>

</head>
<body>
    
    <div class="container">
        <form action="">
            <div class="header">
                <h2>Registration</h2>
            </div>

            <div>
                <label for="name">Name</label>
                <input type="text" name="name" id="name" placeholder="Enter Full Name">
                <span id="nameError" class="showError"></span>
            </div>

            <div>
                <label for="email">Email</label>
                <input type="text" name="email" id="email" placeholder="abc@gmail.com">
                <span id="emailError"></span>
            </div>

            <div>
                <label for="password">Password</label>
                <input type="password" name="password" id="password" placeholder="password">
                <span id="passwordError"></span>
            </div>

            <button type="submit" id="submit-btn" class="btn">Submit</button>
            <button type="reset" class="btn">Reset</button>
        </form>
    </div>
    <script src="./form.js"></script>
</body>
</html>
