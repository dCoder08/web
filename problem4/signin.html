<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login</title>
<link rel="stylesheet" href="styles.css">
</head>

<body>

<header>
    <div class="logo">TechPortal</div>
</header>

<div class="form-box">
    <h2>Login</h2>

    <form id="loginForm">

        <input type="text" id="loginUser" placeholder="Email or Username">
        <div class="error" id="loginUserErr"></div>

        <input type="password" id="loginPass" placeholder="Password">
        <div class="error" id="loginPassErr"></div>

        <button type="submit">Login</button>

    </form>
</div>

<script src="login.js"></script>

</body>
</html>
